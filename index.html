<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELLO MY MONSTER!!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="stars-container"></div>
    
    <div id="main-container">
        <div id="countdown-section">
            <h1 id="main-title">HELLO MY MONSTER!!</h1>
            <h2 id="countdown-label">LET'S COUNT DOWN TOGETHER</h2>
            <div id="countdown" class="countdown">
                <div class="countdown-item">
                    <span class="countdown-number" id="days">0</span>
                    <span class="countdown-label">Days</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="hours">0</span>
                    <span class="countdown-label">Hours</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="minutes">0</span>
                    <span class="countdown-label">Minutes</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="seconds">0</span>
                    <span class="countdown-label">Seconds</span>
                </div>
            </div>
        </div>

        <div id="surprise-section">
            <h1 id="surprise-title">ARE YOU BEBAN?</h1>
            <div id="buttons-container">
                <button id="yes-btn" class="response-btn" disabled>YES</button>
                <button id="no-btn" class="response-btn" disabled>NO</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
